name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_call:

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check vitest-linter
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy vitest-linter
        run: cargo +nightly clippy --lib -- -W clippy::all -W clippy::pedantic -W clippy::nursery

  test:
    name: Test
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test vitest-linter
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage vitest-linter
        run: cargo +nightly llvm-cov --lcov --output-path coverage.lcov --fail-under-lines 90
      - name: Upload coverage to SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.lcov

  audit:
    name: Audit
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  sonarcloud:
    name: SonarCloud
    needs: coverage
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "security", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dogfood:
    name: Dogfood
    needs: test
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Create vitest test file with smells
        run: |
          cat > /tmp/test_smell.test.ts << 'TSEOF'
          import { describe, it, expect, vi } from "vitest";

          describe("bad", () => {
            it("has timeout", async () => {
              await new Promise((r) => setTimeout(r, 5000));
              expect(true).toBe(true);
            }, 10000);
          });
          TSEOF
      - name: Run vitest-linter on smell file
        run: |
          ./target/release/vitest-linter --format json /tmp/test_smell.test.ts > /tmp/vitest-result.json
          violations=$(python3 -c "import json,sys; print(len(json.load(sys.stdin)))" < /tmp/vitest-result.json)
          echo "vitest-linter found $violations violations"
          [ "$violations" -gt 0 ]

  repo-structure:
    name: Repo Structure
    runs-on: ${{ github.event_name == 'push' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build structurelint
        run: |
          git clone --depth 1 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /usr/local/bin/structurelint ./cmd/structurelint
      - name: Run structurelint
        run: structurelint .

  required-checks:
    name: required-checks
    runs-on: ${{ github.event_name == 'push' && '["self-hosted", "rust", "macos"]' || 'ubuntu-latest' }}
    needs: [fmt, clippy, test, coverage, audit, dogfood, repo-structure]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.fmt.result }}" != "success" ] || \
             [ "${{ needs.clippy.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.audit.result }}" != "success" ] || \
             [ "${{ needs.dogfood.result }}" != "success" ] || \
             [ "${{ needs.repo-structure.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
