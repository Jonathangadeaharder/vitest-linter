name: PR Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - name: Check for iCloud sync conflicts
        run: |
          if find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print
            exit 1
          fi

  rust-quality:
    name: Rust Quality
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check format
        run: cargo fmt --check
      - name: Clippy lint
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build
      - name: Tests
        run: cargo test

  dependency-scan:
    name: Dependency Scan
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: brew install aquasecurity/trivy/trivy
      - name: Run Trivy filesystem scan
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed .

  secret-scanning:
    name: Secret Scanning
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: brew install gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose

  structure:
    name: Repository Structure
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build structurelint
        run: |
          git clone --depth 1 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /usr/local/bin/structurelint ./cmd/structurelint
      - name: Run structurelint
        run: structurelint .
      - name: Cleanup structurelint build
        if: always()
        run: rm -rf /tmp/structurelint

  cargo-test-lint:
    name: Test Quality (Rust)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-test-lint
        run: cargo install cargo-test-lint
      - name: Run cargo-test-lint
        run: cargo test-lint

  required-checks:
    name: Required Checks (PR)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    needs:
      - repo-hygiene
      - rust-quality
      - dependency-scan
      - secret-scanning
      - structure
      - cargo-test-lint
    if: always()
    steps:
      - name: Verify all PR gate jobs passed
        run: |
          for JOB in ${{ join(needs.*.result, ' ') }}; do
            if [ "$JOB" != "success" ] && [ "$JOB" != "skipped" ]; then
              echo "❌ Job failed: $JOB"
              exit 1
            fi
          done
          echo "✅ All checks passed"
